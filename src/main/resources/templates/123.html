<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChaosGame — каталог карт</title>
    <style>
        /* ---------- сброс / базовые настройки ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #f5f5f5;
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---------- цвета DNS ---------- */
        :root {
            --dns-orange: #ff6b00;
            --dns-orange-hover: #e55d00;
            --dns-dark: #1a1a1a;
            --dns-gray: #f0f0f0;
            --dns-border: #ddd;
            --dns-green: #4caf50;
            --dns-red: #e53935;
        }

        /* ---------- шапка ---------- */
        .header {
            background: #fff;
            border-bottom: 3px solid var(--dns-orange);
            padding: 12px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dns-dark);
        }

        .header .logo span {
            color: var(--dns-orange);
        }

        .header .nav-links {
            display: flex;
            gap: 24px;
            font-size: 0.95rem;
        }

        .header .nav-links a {
            text-decoration: none;
            color: #444;
            font-weight: 500;
            transition: color 0.2s;
        }

        .header .nav-links a:hover,
        .header .nav-links a.active {
            color: var(--dns-orange);
        }

        /* ---------- основной контейнер ---------- */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 32px;
            flex: 1;
            width: 100%;
        }

        /* ---------- фильтры ---------- */
        .filters {
            background: #fff;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
        }

        .filter-group input,
        .filter-group select {
            padding: 8px 12px;
            border: 1px solid var(--dns-border);
            border-radius: 6px;
            font-size: 0.9rem;
            min-width: 160px;
            transition: border-color 0.2s;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--dns-orange);
            box-shadow: 0 0 0 2px rgba(255, 107, 0, 0.15);
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--dns-orange);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--dns-orange-hover);
        }

        .btn-secondary {
            background: #fff;
            border: 1px solid var(--dns-border);
            color: #333;
        }

        .btn-secondary:hover {
            background: var(--dns-gray);
        }

        .btn-danger {
            background: var(--dns-red);
            color: #fff;
        }

        .btn-danger:hover {
            background: #c62828;
        }

        .btn-success {
            background: var(--dns-green);
            color: #fff;
        }

        .btn-success:hover {
            background: #388e3c;
        }

        /* ---------- карточки ---------- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: box-shadow 0.25s, transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.13);
            transform: translateY(-3px);
        }

        .card .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #aaa;
        }

        .card .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #111;
        }

        .card .card-meta {
            font-size: 0.8rem;
            color: #777;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card .card-meta span {
            background: var(--dns-gray);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .card .card-actions {
            margin-top: auto;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .card .card-actions .btn {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        /* ---------- пагинация ---------- */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 32px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid var(--dns-border);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--dns-gray);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .page-info {
            font-size: 0.9rem;
            color: #555;
        }

        /* ---------- модальные окна ---------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: #fff;
            border-radius: 12px;
            padding: 28px;
            width: 90%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .modal h2 {
            margin-bottom: 16px;
            font-size: 1.3rem;
        }

        .modal .form-group {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .modal .form-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #444;
        }

        .modal .form-group input,
        .modal .form-group select,
        .modal .form-group textarea {
            padding: 8px 12px;
            border: 1px solid var(--dns-border);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .modal .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* ---------- уведомления ---------- */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: var(--dns-green);
        }

        .toast.error {
            background: var(--dns-red);
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ---------- адаптив ---------- */
        @media (max-width: 600px) {
            .header {
                padding: 10px 16px;
            }
            .container {
                padding: 16px;
            }
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<!-- ======================= ШАПКА ======================= -->
<header class="header">
    <div class="logo">Chaos<span>Game</span></div>
    <nav class="nav-links">
        <a href="#" class="active" id="nav-catalog">Каталог</a>
        <a href="#" id="nav-admin">Администрирование</a>
    </nav>
</header>

<!-- ======================= ОСНОВНОЙ БЛОК ======================= -->
<div class="container" id="main-content">
    <!-- динамически заполняется JS -->
</div>

<!-- ==================== МОДАЛЬНОЕ ОКНО (создание / редактирование) ==================== -->
<div class="modal-overlay hidden" id="card-modal-overlay">
    <div class="modal">
        <h2 id="modal-title">Новая карта</h2>
        <div class="form-group">
            <label>Название</label>
            <input type="text" id="modal-name" placeholder="Введите название" />
        </div>
        <div class="form-group">
            <label>Полное описание</label>
            <textarea id="modal-desc" rows="3" placeholder="Описание карты"></textarea>
        </div>
        <div class="form-group">
            <label>Тип</label>
            <select id="modal-type">
                <option value="ATTACK">ATTACK</option>
                <option value="BUFF">BUFF</option>
                <option value="SHIELD">SHIELD</option>
                <option value="ARMOR">ARMOR</option>
                <option value="SHIELD_DEFENDS_ENHANCEMENT">SHIELD_DEFENDS_ENHANCEMENT</option>
            </select>
        </div>
        <div class="form-group">
            <label>Ранг</label>
            <select id="modal-rang">
                <option value="GOLD">GOLD</option>
                <option value="SILVER">SILVER</option>
                <option value="USUAL">USUAL</option>
            </select>
        </div>
        <div class="form-group">
            <label>Редкость</label>
            <select id="modal-rarety">
                <option value="RARE">RARE</option>
                <option value="ORDINARY">ORDINARY</option>
                <option value="UNIQUE">UNIQUE</option>
                <option value="LEGENDARY">LEGENDARY</option>
            </select>
        </div>
        <div class="form-group">
            <label>Длительность (сек)</label>
            <input type="number" id="modal-duration" placeholder="0" step="1" />
        </div>
        <div class="form-group">
            <label>Время восстановления (сек)</label>
            <input type="number" id="modal-recovery" placeholder="0" step="1" />
        </div>
        <div class="form-group">
            <label>Изображение (URL или оставьте пустым)</label>
            <input type="text" id="modal-image" placeholder="https://..." />
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="modal-cancel">Отмена</button>
            <button class="btn btn-primary" id="modal-save">Сохранить</button>
        </div>
    </div>
</div>

<!-- ==================== МОДАЛЬНОЕ ОКНО ЗАГРУЗКИ ФАЙЛА ==================== -->
<div class="modal-overlay hidden" id="upload-modal-overlay">
    <div class="modal">
        <h2>Загрузить изображение для карты</h2>
        <div class="form-group">
            <label>ID карты</label>
            <input type="number" id="upload-card-id" placeholder="Например, 1" />
        </div>
        <div class="form-group">
            <label>Файл изображения</label>
            <input type="file" id="upload-file-input" accept="image/*" />
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="upload-cancel">Отмена</button>
            <button class="btn btn-primary" id="upload-submit">Загрузить</button>
        </div>
    </div>
</div>

<script>
    (function() {
        /* ========== КОНФИГУРАЦИЯ ========== */
        const API_BASE = ''; // или '' – зависит от того, как развёрнут бэкенд
        // Если вы запускаете бэкенд локально на том же порту, можно оставить ''.
        // Если фронт открывается отдельно, укажите полный адрес, например:
        // const API_BASE = 'http://localhost:8080';

        /* ========== СОСТОЯНИЕ ========== */
        let currentPage = 'catalog'; // 'catalog' | 'admin'
        let cards = [];
        let offset = 0;
        const LIMIT = 12;
        let totalCount = 0;
        let editingCardId = null; // null – создание, иначе редактирование

        /* ========== DOM-ЭЛЕМЕНТЫ ========== */
        const mainContent = document.getElementById('main-content');
        const cardModalOverlay = document.getElementById('card-modal-overlay');
        const uploadModalOverlay = document.getElementById('upload-modal-overlay');

        /* ========== ИНИЦИАЛИЗАЦИЯ ========== */
        function init() {
            document.getElementById('nav-catalog').addEventListener('click', (e) => {
                e.preventDefault();
                switchTo('catalog');
            });
            document.getElementById('nav-admin').addEventListener('click', (e) => {
                e.preventDefault();
                switchTo('admin');
            });

            // Модальное окно карты
            document.getElementById('modal-cancel').addEventListener('click', closeCardModal);
            document.getElementById('modal-save').addEventListener('click', saveCard);
            cardModalOverlay.addEventListener('click', (e) => {
                if (e.target === cardModalOverlay) closeCardModal();
            });

            // Модальное окно загрузки файла
            document.getElementById('upload-cancel').addEventListener('click', closeUploadModal);
            document.getElementById('upload-submit').addEventListener('click', uploadFile);
            uploadModalOverlay.addEventListener('click', (e) => {
                if (e.target === uploadModalOverlay) closeUploadModal();
            });

            switchTo('catalog');
        }

        function switchTo(page) {
            currentPage = page;
            document.getElementById('nav-catalog').classList.toggle('active', page === 'catalog');
            document.getElementById('nav-admin').classList.toggle('active', page === 'admin');
            offset = 0;
            cards = [];
            if (page === 'catalog') renderCatalog();
            else renderAdmin();
        }

        /* ========== РЕНДЕР КАТАЛОГА ========== */
        function renderCatalog() {
            mainContent.innerHTML = `
                <div class="filters">
                    <div class="filter-group">
                        <label>Название</label>
                        <input type="text" id="filter-name" placeholder="Поиск…" />
                    </div>
                    <div class="filter-group">
                        <label>Тип</label>
                        <select id="filter-type">
                            <option value="">Все</option>
                            <option value="ATTACK">ATTACK</option>
                            <option value="BUFF">BUFF</option>
                            <option value="SHIELD">SHIELD</option>
                            <option value="ARMOR">ARMOR</option>
                            <option value="SHIELD_DEFENDS_ENHANCEMENT">SHIELD_DEFENDS_ENHANCEMENT</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Ранг</label>
                        <select id="filter-rang">
                            <option value="">Все</option>
                            <option value="GOLD">GOLD</option>
                            <option value="SILVER">SILVER</option>
                            <option value="USUAL">USUAL</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Редкость</label>
                        <select id="filter-rarety">
                            <option value="">Все</option>
                            <option value="RARE">RARE</option>
                            <option value="ORDINARY">ORDINARY</option>
                            <option value="UNIQUE">UNIQUE</option>
                            <option value="LEGENDARY">LEGENDARY</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="btn-apply-filters">🔍 Найти</button>
                </div>
                <div class="cards-grid" id="cards-container"></div>
                <div class="pagination" id="pagination-container"></div>
            `;

            document.getElementById('btn-apply-filters').addEventListener('click', () => {
                offset = 0;
                loadCards();
            });
            loadCards();
        }

        /* ========== РЕНДЕР АДМИНКИ ========== */
        function renderAdmin() {
            mainContent.innerHTML = `
                <div style="display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
                    <button class="btn btn-success" id="btn-create-card">＋ Создать карту</button>
                    <button class="btn btn-secondary" id="btn-upload-picture">📷 Загрузить изображение</button>
                </div>
                <div class="cards-grid" id="cards-container"></div>
                <div class="pagination" id="pagination-container"></div>
            `;

            document.getElementById('btn-create-card').addEventListener('click', () => openCardModal(null));
            document.getElementById('btn-upload-picture').addEventListener('click', openUploadModal);
            loadCards();
        }

        /* ========== ЗАГРУЗКА КАРТОЧЕК ========== */
        async function loadCards() {
            const container = document.getElementById('cards-container');
            const paginationContainer = document.getElementById('pagination-container');
            if (!container) return;

            container.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:40px;">Загрузка…</p>';

            let url = `${API_BASE}/cards?offset=${offset}&limit=${LIMIT}`;
            if (currentPage === 'catalog') {
                const name = document.getElementById('filter-name')?.value.trim();
                const type = document.getElementById('filter-type')?.value;
                const rang = document.getElementById('filter-rang')?.value;
                const rarety = document.getElementById('filter-rarety')?.value;
                if (name) url += `&name=${encodeURIComponent(name)}`;
                if (type) url += `&type=${type}`;
                if (rang) url += `&rang=${rang}`;
                if (rarety) url += `&rarety=${rarety}`;
            }

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                const data = await res.json();
                cards = data.cards || [];
                totalCount = data.totalCount || 0;
                renderCards(container);
                renderPagination(paginationContainer);
            } catch (err) {
                container.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:40px; color:var(--dns-red);">Ошибка загрузки: ${err.message}</p>`;
            }
        }

        function renderCards(container) {
            if (cards.length === 0) {
                container.innerHTML =
                    '<p style="grid-column:1/-1; text-align:center; padding:40px;">Карточки не найдены</p>';
                return;
            }
            container.innerHTML = cards.map(card => {
                const imgSrc = card.originImage || '';
                const imgBlock = imgSrc ?
                    `<img class="card-img" src="${escapeHtml(imgSrc)}" alt="${escapeHtml(card.name)}" />` :
                    `<div class="card-img">🃏</div>`;
                const actions = currentPage === 'admin' ? `
                    <button class="btn btn-primary" data-action="edit" data-id="${card.id}">✎</button>
                    <button class="btn btn-danger" data-action="delete" data-id="${card.id}">🗑</button>
                ` : '';
                return `
                    <div class="card" data-id="${card.id}">
                        ${imgBlock}
                        <div class="card-body">
                            <div class="card-title">${escapeHtml(card.name || 'Без названия')}</div>
                            <div class="card-meta">
                                <span>${escapeHtml(card.type || '—')}</span>
                                <span>${escapeHtml(card.rang || '—')}</span>
                                <span>${escapeHtml(card.rarety || '—')}</span>
                            </div>
                            <div class="card-actions">${actions}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Вешаем обработчики на кнопки
            container.querySelectorAll('[data-action="edit"]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    const card = cards.find(c => c.id == id);
                    if (card) openCardModal(card);
                });
            });
            container.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (confirm('Удалить карту?')) deleteCard(btn.dataset.id);
                });
            });
        }

        function renderPagination(container) {
            if (!container) return;
            const totalPages = Math.ceil(totalCount / LIMIT) || 1;
            const currentPageNum = Math.floor(offset / LIMIT) + 1;
            container.innerHTML = `
                <button ${offset === 0 ? 'disabled' : ''} id="btn-prev">← Назад</button>
                <span class="page-info">Стр. ${currentPageNum} из ${totalPages} (всего: ${totalCount})</span>
                <button ${offset + LIMIT >= totalCount ? 'disabled' : ''} id="btn-next">Вперёд →</button>
            `;
            document.getElementById('btn-prev')?.addEventListener('click', () => {
                if (offset > 0) {
                    offset = Math.max(0, offset - LIMIT);
                    loadCards();
                }
            });
            document.getElementById('btn-next')?.addEventListener('click', () => {
                if (offset + LIMIT < totalCount) {
                    offset += LIMIT;
                    loadCards();
                }
            });
        }

        /* ========== МОДАЛЬНОЕ ОКНО КАРТЫ ========== */
        function openCardModal(card) {
            editingCardId = card ? card.id : null;
            document.getElementById('modal-title').textContent = card ? 'Редактирование карты' :
                'Новая карта';
            document.getElementById('modal-name').value = card ? (card.name || '') : '';
            document.getElementById('modal-desc').value = card ? (card.fullDescription || '') : '';
            document.getElementById('modal-type').value = card ? (card.type || 'ATTACK') : 'ATTACK';
            document.getElementById('modal-rang').value = card ? (card.rang || 'USUAL') : 'USUAL';
            document.getElementById('modal-rarety').value = card ? (card.rarety || 'ORDINARY') : 'ORDINARY';
            document.getElementById('modal-duration').value = card ? (card.duration || 0) : 0;
            document.getElementById('modal-recovery').value = card ? (card.recoveryTime || 0) : 0;
            document.getElementById('modal-image').value = card ? (card.originImage || '') : '';
            cardModalOverlay.classList.remove('hidden');
        }

        function closeCardModal() {
            cardModalOverlay.classList.add('hidden');
            editingCardId = null;
        }

        async function saveCard() {
            const payload = {
                name: document.getElementById('modal-name').value.trim(),
                fullDescription: document.getElementById('modal-desc').value.trim(),
                type: document.getElementById('modal-type').value,
                rang: document.getElementById('modal-rang').value,
                rarety: document.getElementById('modal-rarety').value,
                duration: parseInt(document.getElementById('modal-duration').value) || 0,
                recoveryTime: parseInt(document.getElementById('modal-recovery').value) || 0,
                originImage: document.getElementById('modal-image').value.trim(),
            };

            try {
                let res;
                if (editingCardId) {
                    // PATCH – частичное обновление
                    res = await fetch(`${API_BASE}/cards/${editingCardId}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                } else {
                    // POST – создание
                    res = await fetch(`${API_BASE}/cards`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                }
                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                closeCardModal();
                showToast(editingCardId ? 'Карта обновлена' : 'Карта создана', 'success');
                loadCards();
            } catch (err) {
                showToast(`Ошибка: ${err.message}`, 'error');
            }
        }

        async function deleteCard(id) {
            try {
                const res = await fetch(`${API_BASE}/cards/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                showToast('Карта удалена', 'success');
                loadCards();
            } catch (err) {
                showToast(`Ошибка удаления: ${err.message}`, 'error');
            }
        }

        /* ========== МОДАЛЬНОЕ ОКНО ЗАГРУЗКИ ФАЙЛА ========== */
        function openUploadModal() {
            uploadModalOverlay.classList.remove('hidden');
            document.getElementById('upload-card-id').value = '';
            document.getElementById('upload-file-input').value = '';
        }

        function closeUploadModal() {
            uploadModalOverlay.classList.add('hidden');
        }

        async function uploadFile() {
            const cardId = document.getElementById('upload-card-id').value.trim();
            const fileInput = document.getElementById('upload-file-input');
            const file = fileInput.files[0];
            if (!cardId || !file) {
                showToast('Укажите ID карты и выберите файл', 'error');
                return;
            }
            const formData = new FormData();
            formData.append('cardId', cardId);
            formData.append('file', file);

            try {
                const res = await fetch(`${API_BASE}/cards/${cardId}/upload/picture/`, {
                    method: 'POST',
                    body: formData,
                });
                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                showToast('Изображение загружено', 'success');
                closeUploadModal();
                loadCards();
            } catch (err) {
                showToast(`Ошибка загрузки: ${err.message}`, 'error');
            }
        }

        /* ========== УВЕДОМЛЕНИЯ ========== */
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        /* ========== ЗАПУСК ========== */
        init();
    })();
</script>
</body>
</html>
