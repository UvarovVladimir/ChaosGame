<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamTeam Chaos Game — Библиотека заклинаний</title>
    <!-- Font Awesome 6 для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== СБРОС И БАЗОВЫЕ СТИЛИ ========== */
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --bg-card: #1e1e32;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --accent: #6c5ce7;
            --accent-hover: #7d6ff0;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --gold: #ffd700;
            --red: #e74c3c;
            --green: #2ecc71;
            --border: #2a2a4a;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            --transition: 0.25s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ========== ШАПКА ========== */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 2rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .main-nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-btn {
            padding: 0.55rem 1.3rem;
            border: 1px solid transparent;
            border-radius: 2rem;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 14px var(--accent-glow);
        }

        .nav-btn:hover:not(.active) {
            border-color: var(--accent);
            color: #fff;
        }

        .btn-login {
            padding: 0.5rem 1.2rem;
            border: 1px solid var(--gold);
            border-radius: 2rem;
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }

        .btn-login:hover {
            background: var(--gold);
            color: #000;
        }

        /* ========== КНОПКИ ========== */
        .btn {
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 18px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
        }

        .btn-danger:hover {
            background: var(--red);
            color: #fff;
        }

        .btn-sm {
            padding: 0.35rem 0.9rem;
            font-size: 0.8rem;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ========== КОНТЕНТ ========== */
        .app-content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.8rem 2rem;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== ГАЛЕРЕЯ ========== */
        .search-bar {
            position: relative;
            margin-bottom: 2rem;
            max-width: 500px;
        }

        .search-bar input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border: 1px solid var(--border);
            border-radius: 2rem;
            background: var(--bg-secondary);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .search-bar i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.6rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(108, 92, 231, 0.3);
            border-color: var(--accent);
        }

        .card-image {
            position: relative;
            width: 100%;
            height: 200px;
            background: var(--bg-tertiary);
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-image .placeholder-img {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 3rem;
            color: var(--text-secondary);
            background: linear-gradient(135deg, #1a1a3e, #16213e);
        }

        .card-mana {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: var(--gold);
            padding: 0.25rem 0.7rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .card-body {
            padding: 1.1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-body h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .card-type {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 0.6rem;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
            flex: 1;
        }

        .card-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .card-stats span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .card-footer {
            padding: 0.7rem 1.1rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rarity-badge {
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .rarity-common { background: #555; color: #ccc; }
        .rarity-rare { background: #2e86de; color: #fff; }
        .rarity-epic { background: #8e44ad; color: #fff; }
        .rarity-legendary { background: var(--gold); color: #000; }

        /* ========== ПАГИНАЦИЯ ========== */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 2.5rem;
            padding: 1rem 0;
        }

        .pagination button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination span {
            font-weight: 500;
        }

        /* ========== АДМИН-ПАНЕЛЬ ========== */
        .admin-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .admin-toolbar input {
            padding: 0.55rem 1rem;
            border: 1px solid var(--border);
            border-radius: 2rem;
            background: var(--bg-secondary);
            color: #fff;
            outline: none;
            width: 250px;
        }

        .admin-table-wrapper {
            overflow-x: auto;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .admin-table th,
        .admin-table td {
            padding: 0.8rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .admin-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-table tbody tr {
            transition: var(--transition);
        }

        .admin-table tbody tr:hover {
            background: rgba(108, 92, 231, 0.08);
        }

        .actions-cell {
            display: flex;
            gap: 0.4rem;
        }

        /* ========== МОДАЛЬНОЕ ОКНО ========== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 2rem;
            width: 90%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            animation: fadeIn 0.3s ease;
        }

        .modal-content h3 {
            margin-bottom: 1.2rem;
            font-size: 1.3rem;
        }

        .close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .close:hover {
            color: var(--red);
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.12);
        }

        .image-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .image-upload-area:hover {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.05);
        }

        .image-upload-area i {
            font-size: 2rem;
            color: var(--text-secondary);
        }

        .image-upload-area img {
            max-width: 100%;
            max-height: 180px;
            border-radius: var(--radius-sm);
            margin-top: 0.5rem;
        }

        /* ========== УВЕДОМЛЕНИЯ ========== */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.9rem 1.4rem;
            border-radius: 2rem;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow);
        }

        .toast-success { background: var(--green); }
        .toast-error { background: var(--red); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== АДАПТИВ ========== */
        @media (max-width: 768px) {
            .app-header {
                flex-wrap: wrap;
                gap: 0.8rem;
                padding: 0.8rem 1rem;
            }

            .logo { font-size: 1rem; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
            .admin-toolbar { flex-direction: column; align-items: stretch; }
            .admin-toolbar input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- ==================== ШАПКА ==================== -->
    <header class="app-header">
        <div class="logo">🌌 DreamTeam Chaos Game</div>
        <nav class="main-nav">
            <button class="nav-btn active" data-view="gallery">
                <i class="fas fa-th"></i> Галерея
            </button>
            <button class="nav-btn admin-only" data-view="admin">
                <i class="fas fa-cogs"></i> Админ‑панель
            </button>
        </nav>
        <div class="user-actions">
            <button id="loginBtn" class="btn-login"><i class="fas fa-user"></i> Войти</button>
        </div>
    </header>

    <!-- ==================== ОСНОВНОЙ КОНТЕНТ ==================== -->
    <main class="app-content">

        <!-- ГАЛЕРЕЯ (по умолчанию) -->
        <section id="galleryView" class="view active">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="gallerySearch" placeholder="Поиск по названию заклинания..." autocomplete="off">
            </div>
            <div id="cardsGrid" class="cards-grid">
                <!-- JS наполнение -->
            </div>
            <div class="pagination" id="galleryPagination">
                <button id="prevPage" disabled><i class="fas fa-chevron-left"></i></button>
                <span id="pageIndicator">Страница 1</span>
                <button id="nextPage"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <!-- АДМИН-ПАНЕЛЬ -->
        <section id="adminView" class="view">
            <div class="admin-toolbar">
                <button id="addCardBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Создать заклинание
                </button>
                <input type="text" id="adminSearch" placeholder="Поиск по названию..." autocomplete="off">
            </div>
            <div class="admin-table-wrapper">
                <table id="adminTable" class="admin-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Картинка</th>
                        <th>Название</th>
                        <th>Тип</th>
                        <th>Редкость</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody id="adminTableBody">
                    <!-- JS наполнение -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>
</div>

<!-- ==================== МОДАЛЬНОЕ ОКНО ДЛЯ CRUD ==================== -->
<div id="cardModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h3 id="modalTitle">Новое заклинание</h3>
        <form id="cardForm">
            <input type="hidden" id="cardId">

            <div class="form-group">
                <label for="cardName">Название</label>
                <input type="text" id="cardName" required placeholder="Например, Огненный шар">
            </div>

            <div class="form-group">
                <label for="cardType">Тип карты</label>
                <select id="cardType">
                    <option value="ATTACK">Атакующее заклинание</option>
                    <option value="BUFF">Усиливающее заклинание</option>
                    <option value="SHIELD">Щит</option>
                    <option value="ARMOR">Доспех</option>
                    <option value="SHIELD_DEFENDS_ENHANCEMENT">Усиление защиты</option>

                </select>
            </div>

            <div class="form-group">
                <label for="cardRang">Ранг</label>
                <select id="cardRang">
                    <option value="GOLD">Золотой</option>
                    <option value="SILVER">Серебрянный</option>
                    <option value="USUAL">Обычный</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cardRarety">Редкость</label>
                <select id="cardRarety">
                    <option value="RARE">Редкая</option>
                    <option value="ORDINARY">Эпическая</option>
                    <option value="UNIQUE">Эпическая</option>
                    <option value="LEGENDARY">Легендарная</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cardDuration">Длительность (в секундах)</label>
                <input type="number" id="cardDuration" value="0" min="0">
            </div>

            <div class="form-group">
                <label for="cardRecovery">Время восстановления (в секундах)</label>
                <input type="number" id="cardRecovery" value="0" min="0">
            </div>

            <div class="form-group">
                <label for="cardDescription">Полное описание</label>
                <textarea id="cardDescription" rows="4" required placeholder="Опишите заклинание..."></textarea>
            </div>

            <div class="form-group">
                <label>Изображение карты</label>
                <div class="image-upload-area" id="imageDropZone">
                    <input type="file" id="imageFile" accept="image/*" hidden>
                    <div id="uploadPlaceholder">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Перетащите изображение или кликните для выбора</p>
                    </div>
                    <img id="imagePreview" src="" alt="Предпросмотр" style="display: none;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-save"></i> Сохранить
            </button>
        </form>
    </div>
</div>

<!-- ==================== СКРИПТЫ ==================== -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    (function() {
        // ==================== КОНФИГУРАЦИЯ ====================
        const API_BASE = '';                // базовый URL, если фронт и бэк на одном origin
        const DEFAULT_LIMIT = 12;           // карт на странице в галерее
        const ADMIN_LIMIT = 50;             // карт в таблице админа

        // ==================== DOM-ЭЛЕМЕНТЫ ====================
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        // Навигация
        const navButtons = $$('.nav-btn');
        const galleryView = $('#galleryView');
        const adminView = $('#adminView');

        // Галерея
        const cardsGrid = $('#cardsGrid');
        const gallerySearch = $('#gallerySearch');
        const prevPageBtn = $('#prevPage');
        const nextPageBtn = $('#nextPage');
        const pageIndicator = $('#pageIndicator');

        // Админка
        const adminTableBody = $('#adminTableBody');
        const adminSearch = $('#adminSearch');
        const addCardBtn = $('#addCardBtn');

        // Модальное окно
        const modal = $('#cardModal');
        const closeModalBtn = $('#closeModal');
        const cardForm = $('#cardForm');
        const modalTitle = $('#modalTitle');
        const cardIdInput = $('#cardId');
        const cardNameInput = $('#cardName');
        const cardTypeSelect = $('#cardType');
        const cardRangSelect = $('#cardRang');
        const cardRaretySelect = $('#cardRarety');
        const cardDurationInput = $('#cardDuration');
        const cardRecoveryInput = $('#cardRecovery');
        const cardDescriptionInput = $('#cardDescription');
        const imageFileInput = $('#imageFile');
        const imageDropZone = $('#imageDropZone');
        const uploadPlaceholder = $('#uploadPlaceholder');
        const imagePreview = $('#imagePreview');

        // ==================== СОСТОЯНИЕ ====================
        let currentPage = 0;
        let totalCards = 0;
        let selectedFile = null;       // File для загрузки

        // ==================== УТИЛИТЫ ====================
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function getRarityClass(rarity) {
            if (!rarity) return '';
            const r = rarity.toLowerCase();
            if (r === 'legendary' || r === 'легендарная') return 'rarity-legendary';
            if (r === 'epic' || r === 'эпическая') return 'rarity-epic';
            if (r === 'rare' || r === 'редкая') return 'rarity-rare';
            return 'rarity-common';
        }

        function getRarityLabel(rarity) {
            if (!rarity) return '?';
            const r = rarity.toLowerCase();
            if (r === 'legendary') return 'ЛЕГЕНДАРНАЯ';
            if (r === 'epic') return 'ЭПИЧЕСКАЯ';
            if (r === 'rare') return 'РЕДКАЯ';
            return 'ОБЫЧНАЯ';
        }

        // для отображения duration (приходит в секундах?)
        function formatDuration(seconds) {
            if (!seconds || seconds <= 0) return '—';
            if (seconds < 60) return seconds + 'с';
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return m + 'м ' + (s > 0 ? s + 'с' : '');
        }

        // ==================== НАВИГАЦИЯ ====================
        navButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                navButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const view = btn.dataset.view;
                galleryView.classList.toggle('active', view === 'gallery');
                adminView.classList.toggle('active', view === 'admin');
                if (view === 'gallery') loadGalleryCards();
                if (view === 'admin') loadAdminCards();
            });
        });

        // ==================== ЗАГРУЗКА ДАННЫХ ====================
        async function loadGalleryCards(page = 0) {
            try {
                const name = gallerySearch.value.trim() || null;
                const params = {
                    offset: page,
                    limit: DEFAULT_LIMIT,
                };
                if (name) params.name = name;

                const resp = await axios.get(API_BASE + '/cards', { params });
                const data = resp.data;   // CardsByParamsResponseDTO
                const cards = data.cards || data.content || [];
                totalCards = data.totalCount ?? data.totalElements ?? 0;
                currentPage = page;

                renderGalleryCards(cards);
                updatePagination();
            } catch (err) {
                console.error('Ошибка загрузки галереи:', err);
                showToast('Не удалось загрузить карты', 'error');
            }
        }

        function renderGalleryCards(cards) {
            if (!cards.length) {
                cardsGrid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-secondary);">🔮 Заклинания не найдены</p>';
                return;
            }

            cardsGrid.innerHTML = cards.map(card => {
                const imageUrl = card.originImage
                    ? API_BASE + '/download/' + card.id
                    : null;
                const rarityClass = getRarityClass(card.rarety);
                const rarityLabel = getRarityLabel(card.rarety);
                const duration = formatDuration(card.duration);

                return `
                        <div class="card">
                            <div class="card-image">
                                ${imageUrl
                    ? `<img src="${imageUrl}" alt="${card.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                       <div class="placeholder-img" style="display:none;"><i class="fas fa-image"></i></div>`
                    : `<div class="placeholder-img"><i class="fas fa-image"></i></div>`
                }
                                <div class="card-mana">⚡ ${card.rang ?? '?'}</div>
                            </div>
                            <div class="card-body">
                                <h3>${card.name ?? 'Без названия'}</h3>
                                <div class="card-type">${card.type ?? 'Неизвестный тип'}</div>
                                <div class="card-desc">${card.fullDescription ?? 'Описание отсутствует'}</div>
                                <div class="card-stats">
                                    <span><i class="fas fa-clock"></i> ${duration}</span>
                                    <span><i class="fas fa-redo-alt"></i> ${formatDuration(card.recoveryTime)}</span>
                                </div>
                            </div>
                            <div class="card-footer">
                                <span class="rarity-badge ${rarityClass}">${rarityLabel}</span>
                                <span style="font-size:0.75rem; color:var(--text-secondary);">ID: ${card.id}</span>
                            </div>
                        </div>`;
            }).join('');
        }

        function updatePagination() {
            const totalPages = Math.ceil(totalCards / DEFAULT_LIMIT) || 1;
            pageIndicator.textContent = `Страница ${currentPage + 1} из ${totalPages}`;
            prevPageBtn.disabled = currentPage === 0;
            nextPageBtn.disabled = (currentPage + 1) >= totalPages;
        }

        // -------------------- АДМИН-ТАБЛИЦА --------------------
        async function loadAdminCards() {
            try {
                const name = adminSearch.value.trim() || null;
                const params = {
                    offset: 0,
                    limit: ADMIN_LIMIT,
                };
                if (name) params.name = name;

                const resp = await axios.get(API_BASE + '/cards', { params });
                const data = resp.data;
                const cards = data.cards || data.content || [];
                renderAdminTable(cards);
            } catch (err) {
                console.error('Ошибка загрузки админки:', err);
                showToast('Ошибка загрузки таблицы', 'error');
            }
        }

        function renderAdminTable(cards) {
            if (!cards.length) {
                adminTableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--text-secondary);">Нет карт</td></tr>';
                return;
            }

            adminTableBody.innerHTML = cards.map(card => {
                const imgCell = card.originImage
                    ? `<img src="${API_BASE}/download/${card.id}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;" onerror="this.outerHTML='❌'">`
                    : '—';
                return `
                        <tr>
                            <td>${card.id}</td>
                            <td>${imgCell}</td>
                            <td><strong>${card.name ?? '—'}</strong></td>
                            <td>${card.type ?? '—'}</td>
                            <td><span class="rarity-badge ${getRarityClass(card.rarety)}">${getRarityLabel(card.rarety)}</span></td>
                            <td class="actions-cell">
                                <button class="btn-icon btn-sm edit-btn" data-id="${card.id}" title="Редактировать"><i class="fas fa-edit"></i></button>
                                <button class="btn-icon btn-sm delete-btn" data-id="${card.id}" title="Удалить"><i class="fas fa-trash"></i></button>
                                <button class="btn-icon btn-sm upload-btn" data-id="${card.id}" title="Загрузить картинку"><i class="fas fa-upload"></i></button>
                            </td>
                        </tr>`;
            }).join('');

            // Навешиваем обработчики на кнопки строк
            adminTableBody.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => openEditModal(btn.dataset.id));
            });
            adminTableBody.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteCard(btn.dataset.id));
            });
            adminTableBody.querySelectorAll('.upload-btn').forEach(btn => {
                btn.addEventListener('click', () => openUploadOnlyModal(btn.dataset.id));
            });
        }

        // ==================== CRUD-ОПЕРАЦИИ ====================
        function resetForm() {
            cardForm.reset();
            cardIdInput.value = '';
            selectedFile = null;
            imageFileInput.value = '';
            imagePreview.style.display = 'none';
            uploadPlaceholder.style.display = 'block';
            modalTitle.textContent = 'Новое заклинание';
        }

        function openCreateModal() {
            resetForm();
            modal.classList.add('active');
        }

        async function openEditModal(cardId) {
            try {
                const resp = await axios.get(API_BASE + `/cards/${cardId}`);
                const card = resp.data;
                resetForm();
                modalTitle.textContent = 'Редактировать заклинание';
                cardIdInput.value = card.id;
                cardNameInput.value = card.name ?? '';
                cardTypeSelect.value = card.type ?? 'SPELL';
                cardRangSelect.value = card.rang ?? 'COMMON';
                cardRaretySelect.value = card.rarety ?? 'COMMON';
                cardDurationInput.value = card.duration ?? 0;
                cardRecoveryInput.value = card.recoveryTime ?? 0;
                cardDescriptionInput.value = card.fullDescription ?? '';
                if (card.originImage) {
                    imagePreview.src = API_BASE + '/download/' + card.id;
                    imagePreview.style.display = 'block';
                    uploadPlaceholder.style.display = 'none';
                }
                modal.classList.add('active');
            } catch (err) {
                console.error(err);
                showToast('Не удалось загрузить карту для редактирования', 'error');
            }
        }

        async function openUploadOnlyModal(cardId) {
            // Упрощённая загрузка: показываем модалку только с полем файла
            resetForm();
            modalTitle.textContent = 'Загрузить изображение (ID: ' + cardId + ')';
            cardIdInput.value = cardId;
            // делаем остальные поля неактивными (но не required)
            cardNameInput.required = false;
            cardDescriptionInput.required = false;
            modal.classList.add('active');
            // после закрытия возвращаем required
            const restore = () => {
                cardNameInput.required = true;
                cardDescriptionInput.required = true;
            };
            modal.addEventListener('transitionend', restore, { once: true });
        }

        cardForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = cardIdInput.value;
            const payload = {
                id: id || null,
                name: cardNameInput.value,
                type: cardTypeSelect.value,
                rang: cardRangSelect.value,
                rarety: cardRaretySelect.value,
                duration: parseInt(cardDurationInput.value) || 0,
                recoveryTime: parseInt(cardRecoveryInput.value) || 0,
                fullDescription: cardDescriptionInput.value,
                originImage: null,   // будет перезаписан при upload
            };

            try {
                let savedCard;
                if (id) {
                    // обновление через PATCH
                    const resp = await axios.patch(API_BASE + `/cards/${id}`, payload);
                    savedCard = resp.data;
                } else {
                    // создание новой карты
                    const resp = await axios.post(API_BASE + '/cards', payload);
                    savedCard = resp.data;
                }

                // Если выбран файл — загружаем его
                if (selectedFile && savedCard.id) {
                    const formData = new FormData();
                    formData.append('cardId', savedCard.id);
                    formData.append('file', selectedFile);
                    await axios.post(API_BASE + `/cards/${savedCard.id}/upload/picture/`, formData, {
                        headers: { 'Content-Type': 'multipart/form-data' }
                    });
                }

                showToast(id ? 'Карта обновлена' : 'Карта создана');
                closeModalFn();
                // перезагружаем активное представление
                if (galleryView.classList.contains('active')) loadGalleryCards(currentPage);
                if (adminView.classList.contains('active')) loadAdminCards();
            } catch (err) {
                console.error(err);
                const msg = err.response?.data?.message || err.response?.data || 'Ошибка сохранения';
                showToast(typeof msg === 'string' ? msg : 'Ошибка сохранения', 'error');
            }
        });

        async function deleteCard(cardId) {
            if (!confirm('Удалить карту #' + cardId + '? Это действие необратимо.')) return;
            try {
                await axios.delete(API_BASE + `/cards/${cardId}`);
                showToast('Карта удалена');
                if (adminView.classList.contains('active')) loadAdminCards();
                if (galleryView.classList.contains('active')) loadGalleryCards(currentPage);
            } catch (err) {
                console.error(err);
                showToast('Ошибка удаления', 'error');
            }
        }

        // ==================== МОДАЛЬНОЕ ОКНО ====================
        function closeModalFn() {
            modal.classList.remove('active');
            cardNameInput.required = true;
            cardDescriptionInput.required = true;
        }

        closeModalBtn.addEventListener('click', closeModalFn);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModalFn();
        });

        addCardBtn.addEventListener('click', openCreateModal);

        // ==================== ЗАГРУЗКА ИЗОБРАЖЕНИЯ (drag & drop) ====================
        imageDropZone.addEventListener('click', () => imageFileInput.click());

        imageFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                showImagePreview(selectedFile);
            }
        });

        imageDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageDropZone.style.borderColor = 'var(--accent)';
        });

        imageDropZone.addEventListener('dragleave', () => {
            imageDropZone.style.borderColor = 'var(--border)';
        });

        imageDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            imageDropZone.style.borderColor = 'var(--border)';
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                imageFileInput.files = e.dataTransfer.files; // синхронизация
                showImagePreview(selectedFile);
            }
        });

        function showImagePreview(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                imagePreview.src = ev.target.result;
                imagePreview.style.display = 'block';
                uploadPlaceholder.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // ==================== ПОИСК (ГАЛЕРЕЯ) ====================
        let gallerySearchTimer;
        gallerySearch.addEventListener('input', () => {
            clearTimeout(gallerySearchTimer);
            gallerySearchTimer = setTimeout(() => {
                currentPage = 0;
                loadGalleryCards(0);
            }, 400);
        });

        // ==================== ПОИСК (АДМИНКА) ====================
        let adminSearchTimer;
        adminSearch.addEventListener('input', () => {
            clearTimeout(adminSearchTimer);
            adminSearchTimer = setTimeout(() => loadAdminCards(), 400);
        });

        // ==================== ПАГИНАЦИЯ ====================
        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 0) loadGalleryCards(currentPage - 1);
        });

        nextPageBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(totalCards / DEFAULT_LIMIT) || 1;
            if (currentPage + 1 < totalPages) loadGalleryCards(currentPage + 1);
        });

        // ==================== ЗАПУСК ====================
        loadGalleryCards(0);

    })();
</script>
</body>
</html>
